name: push-booster

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: push_booster
      POSTGRES_USER: push_booster
      POSTGRES_PASSWORD: push_booster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U push_booster -d push_booster"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: push_booster
      CLICKHOUSE_USER: push_booster
      CLICKHOUSE_PASSWORD: push_booster
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-0:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-0:9092,OUTSIDE://localhost:19092
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda-0:33145
    ports:
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda_0_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "redpanda-0:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-1:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "1"
      - --check=false
      - --seeds
      - redpanda-0:33145
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19093
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-1:9092,OUTSIDE://localhost:19093
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda-1:33145
    ports:
      - "19093:19093"
      - "19645:9644"
    volumes:
      - redpanda_1_data:/var/lib/redpanda/data
    depends_on:
      redpanda-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "redpanda-1:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-2:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "2"
      - --check=false
      - --seeds
      - redpanda-0:33145
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19094
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda-2:9092,OUTSIDE://localhost:19094
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda-2:33145
    ports:
      - "19094:19094"
      - "19646:9644"
    volumes:
      - redpanda_2_data:/var/lib/redpanda/data
    depends_on:
      redpanda-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "redpanda-2:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda-0:9092,redpanda-1:9092,redpanda-2:9092
    ports:
      - "8081:8080"
    depends_on:
      redpanda-0:
        condition: service_healthy
      redpanda-1:
        condition: service_healthy
      redpanda-2:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  clickhouse_data:
  redpanda_0_data:
  redpanda_1_data:
  redpanda_2_data:
  redis_data:
